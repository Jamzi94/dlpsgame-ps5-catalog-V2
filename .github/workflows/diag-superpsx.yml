name: Diag SuperPSX

# Workflow de diagnostic isolé (manuel). Ne touche pas au catalogue.
# But : voir exactement ce que le runner GitHub reçoit de superpsx.com
# (status HTTP, mur Cloudflare, structure) pour réparer scrape_superpsx.py.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnose SuperPSX (curl direct)
        run: python3 scripts/diag_superpsx.py
